name: Release

# Builds WebSave (the Tauri desktop engine) for macOS, Windows and Linux on
# both x86_64 and ARM64, then publishes the installers to a draft GitHub
# Release.
#
# The native macOS menubar companion (macos-menubar/) is intentionally NOT
# built here — it is a separate, macOS-only artifact produced locally by
# `npm run menubar`, and it is not a Cargo workspace member, so nothing in
# this workflow touches it.
#
# Triggering:
#   • push a tag like `v0.1.0`, or
#   • run it manually from the Actions tab (workflow_dispatch).
# The release tag/name derive from the version in src-tauri/tauri.conf.json
# via the __VERSION__ placeholder, so bump that (and package.json) per release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the action to create the GitHub Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      # One target failing (e.g. an ARM runner being unavailable) should not
      # cancel the others.
      fail-fast: false
      matrix:
        include:
          # ---- macOS ----
          - label: macOS (Apple Silicon)
            platform: macos-14 # arm64 runner
            target: aarch64-apple-darwin
          - label: macOS (Intel)
            platform: macos-13 # x86_64 runner
            target: x86_64-apple-darwin

          # ---- Linux ----
          - label: Linux (x86_64)
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: Linux (ARM64)
            platform: ubuntu-22.04-arm # GitHub-hosted Arm64 Linux runner
            target: aarch64-unknown-linux-gnu

          # ---- Windows ----
          - label: Windows (x86_64)
            platform: windows-latest
            target: x86_64-pc-windows-msvc
          - label: Windows (ARM64)
            platform: windows-11-arm # GitHub-hosted Arm64 Windows runner
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WebKitGTK + tray + svg + AppImage tooling. Required on Linux only;
      # the arm64 runner pulls the same package names for its architecture.
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl wget file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the Cargo registry and the workspace target dir, scoped per
      # platform+target so the six builds don't clobber each other.
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.target }}
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional: macOS code signing + notarization ---
          # Builds work unsigned without these. To ship notarized DMGs, add
          # the matching repository secrets and uncomment. (Unset secrets are
          # passed as empty strings, which Tauri treats as "skip signing".)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Tag/name come from src-tauri/tauri.conf.json's version.
          tagName: v__VERSION__
          releaseName: "WebSave v__VERSION__"
          releaseBody: "See the assets below to download and install WebSave for your platform."
          releaseDraft: true
          prerelease: false
          # Per-target build so artifacts are named for their architecture.
          args: --target ${{ matrix.target }}
