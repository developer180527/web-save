<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a31"/>
      <stop offset="1" stop-color="#131316"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="450" cy="592" r="288"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- globe: white strokes -->
  <g stroke="#f4f4f6" stroke-width="30" fill="none" stroke-linecap="round">
    <circle cx="450" cy="592" r="288"/>
    <ellipse cx="450" cy="592" rx="126" ry="288"/>
    <g clip-path="url(#globeClip)">
      <line x1="140" y1="494" x2="760" y2="494"/>
      <line x1="140" y1="690" x2="760" y2="690"/>
    </g>
  </g>

  <!-- slim amber tag on the y = -x diagonal: tip pointing north-west,
       pinned at the globe's shoulder, base running out to the south-east -->
  <g transform="translate(580,345) rotate(45)" stroke="#f2b347"
     stroke-width="28" stroke-linejoin="round" stroke-linecap="round">
    <path d="M0 0 L128 -80 L412 -80 A28 28 0 0 1 440 -52 L440 52 A28 28 0 0 1 412 80 L128 80 Z"
          fill="#1b1b20"/>
    <circle cx="352" cy="0" r="25" fill="none"/>
  </g>
</svg>
